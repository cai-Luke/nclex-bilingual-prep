name: Promotion Gate

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Run audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run promotion gate
        run: npm run audit

      - name: Check census drift
        run: npm run census:check
