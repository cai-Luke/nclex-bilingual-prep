name: Promotion Gate

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Run audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run promotion gate
        run: npm run audit

      - name: Test sweep validator
        run: npm run test:validate-sweep

      - name: Test non-MCQ bias audit and Layer B handoff
        run: npm run test:non-mcq-bias

      - name: Test bank schema invariants
        run: npm run test:schema-bank

      - name: Test coverage targeting
        run: npm run test:coverage-report

      - name: Check census drift
        run: npm run census:check
